services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-vpnpanel}
      POSTGRES_PASSWORD: ${DB_PASS:-vpnpanel}
      POSTGRES_DB: ${DB_NAME:-vpnpanel}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-vpnpanel}"]
      interval: 5s
      timeout: 5s
      retries: 5

  xray:
    image: ghcr.io/xtls/xray-core:${XRAY_IMAGE_TAG:-25.5.16}
    restart: unless-stopped
    network_mode: host
    user: "0:0"
    depends_on:
      panel:
        condition: service_started
    volumes:
      - xray-config:/etc/xray
      - xray-logs:/var/log/xray
    command: ["run", "-c", "/etc/xray/config.json"]

  mtproto:
    build: ./docker/mtprotoproxy
    container_name: ${MTPROTO_CONTAINER:-xray-panel-mtproto}
    restart: unless-stopped
    network_mode: host
    environment:
      MTPROTO_CONFIG_PATH: /config/config.py
    depends_on:
      panel:
        condition: service_started
    volumes:
      - mtproto-config:/config

  panel:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    network_mode: host
    cap_add:
      - NET_ADMIN
    environment:
      BASE_URL: "${BASE_URL:-http://localhost:8080}"
      LISTEN_ADDR: "${LISTEN_ADDR:-}:${LISTEN_PORT:-8080}"
      SECRET_KEY: ${SECRET_KEY:-change-me-to-random-string-32ch}
      DB_HOST: "127.0.0.1"
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-vpnpanel}
      DB_PASS: ${DB_PASS:-vpnpanel}
      DB_NAME: ${DB_NAME:-vpnpanel}
      XRAY_API_ADDR: "127.0.0.1:${XRAY_API_PORT:-10085}"
      XRAY_INBOUND_TAG: ${XRAY_INBOUND_TAG:-vless-in}
      XRAY_CONFIG_PATH: /etc/xray/config.json
      MTPROTO_ENABLED: ${MTPROTO_ENABLED:-true}
      MTPROTO_SERVER_PORT: ${MTPROTO_SERVER_PORT:-8443}
      MTPROTO_LISTEN_ADDR: ${MTPROTO_LISTEN_ADDR:-0.0.0.0}
      MTPROTO_LISTEN_ADDR_V6: ${MTPROTO_LISTEN_ADDR_V6:-::}
      MTPROTO_CONFIG_PATH: /etc/mtprotoproxy/config.py
      MTPROTO_METRICS_ADDR: ${MTPROTO_METRICS_ADDR:-127.0.0.1:9091}
      MTPROTO_METRICS_PORT: ${MTPROTO_METRICS_PORT:-9091}
      MTPROTO_CONTAINER: ${MTPROTO_CONTAINER:-xray-panel-mtproto}
      MTPROTO_DOCKER_SOCKET: /var/run/docker.sock
      MTPROTO_TLS_DOMAIN: ${MTPROTO_TLS_DOMAIN:-vk.com}
      MTPROTO_MASK_HOST: ${MTPROTO_MASK_HOST:-vk.com}
      MTPROTO_SOCKS5_HOST: ${MTPROTO_SOCKS5_HOST:-}
      MTPROTO_SOCKS5_PORT: ${MTPROTO_SOCKS5_PORT:-0}
      MTPROTO_SOCKS5_USER: ${MTPROTO_SOCKS5_USER:-}
      MTPROTO_SOCKS5_PASS: ${MTPROTO_SOCKS5_PASS:-}
      SERVER_ADDR: ${SERVER_ADDR}
      SERVER_PORT: ${SERVER_PORT:-443}
      REALITY_DEST: ${REALITY_DEST:-}
      REALITY_SERVER_NAME: ${REALITY_SERVER_NAME:-}
      REALITY_PRIVATE_KEY: ${REALITY_PRIVATE_KEY}
      REALITY_PUBLIC_KEY: ${REALITY_PUBLIC_KEY}
      REALITY_SHORT_ID: ${REALITY_SHORT_ID}
      AMSTERDAM_ADDR: ${AMSTERDAM_ADDR}
      AMSTERDAM_PORT: ${AMSTERDAM_PORT:-443}
      AMSTERDAM_UUID: ${AMSTERDAM_UUID}
      AMSTERDAM_SNI: ${AMSTERDAM_SNI:-www.google.com}
      AMSTERDAM_PUBLIC_KEY: ${AMSTERDAM_PUBLIC_KEY}
      AMSTERDAM_SHORT_ID: ${AMSTERDAM_SHORT_ID}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_FROM: ${SMTP_FROM}
      FEEDBACK_EMAIL: ${FEEDBACK_EMAIL:-}
      PAY_SERVICE_URL: ${PAY_SERVICE_URL:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
    volumes:
      - xray-config:/etc/xray
      - mtproto-config:/etc/mtprotoproxy
      - xray-logs:/var/log/xray
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  pgdata:
  xray-config:
  mtproto-config:
  xray-logs:
