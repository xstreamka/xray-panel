{{template "base" .}}

{{define "title"}}Регистрация — VPN Panel{{end}}

{{define "content"}}
<div style="max-width: 400px; margin: 4rem auto;">
    <div class="card">
        <h2 style="margin-bottom: 1.5rem; text-align: center;">Регистрация</h2>
        {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
        <form method="POST" action="/register">
            <label for="username">Логин</label>
            <input type="text" id="username" name="username" required autofocus>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" required minlength="6">
            <label for="password_confirm">Пароль ещё раз</label>
            <input type="password" id="password_confirm" name="password_confirm" required minlength="6">
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Зарегистрироваться</button>
        </form>
        <p style="text-align: center; margin-top: 1rem; color: #94a3b8;">
            Уже есть аккаунт? <a href="/login" style="color: #38bdf8;">Войти</a>
        </p>
    </div>
</div>
{{end}}
