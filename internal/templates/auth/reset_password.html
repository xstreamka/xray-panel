{{template "base" .}}

{{define "title"}}Новый пароль — Панель для клиентов{{end}}

{{define "content"}}
<div style="max-width: 400px; margin: 4rem auto;">
    <h1 class="auth-brand">Панель для клиентов</h1>
    <div class="card">
        <h2 style="margin-bottom: 1.5rem; text-align: center;">Новый пароль</h2>
        {{if .Error}}<div class="error">{{.Error}}</div>{{end}}
        {{if .Token}}
            <form method="POST" action="/reset">
                {{template "csrf" .}}
                <input type="hidden" name="token" value="{{.Token}}">
                <label for="password">Новый пароль</label>
                <input type="password" id="password" name="password" required minlength="12" maxlength="128" autofocus>
                <label for="password_confirm">Пароль ещё раз</label>
                <input type="password" id="password_confirm" name="password_confirm" required minlength="12" maxlength="128">
                <p style="font-size: 0.8rem; color: #94a3b8; margin: 0.4rem 0 0.6rem;">От 12 до 128 символов.</p>
                <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 0.5rem;">Сохранить</button>
            </form>
        {{else}}
            <p style="text-align: center; color: #94a3b8;">
                <a href="/forgot" style="color: #38bdf8;">Запросить восстановление заново</a>
            </p>
        {{end}}
    </div>
</div>
{{end}}
