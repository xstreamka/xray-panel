{{/* csrf — общий partial для всех форм. .CSRFToken прокидывает Renderer
    из request-контекста (см. internal/middleware/csrf.go). */}}
{{define "csrf"}}<input type="hidden" name="csrf_token" value="{{.CSRFToken}}">{{end}}

{{define "base"}}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{block "title" .}}XS VPN{{end}}</title>
    <link rel="icon" type="image/svg+xml" href="/static/img/favicon.svg">
    <link rel="stylesheet" href="/static/css/main.css?v={{assetVersion}}">
    {{block "head" .}}{{end}}
</head>
<body>
    {{template "nav" .}}
    <div class="container">
        {{block "content" .}}{{end}}
    </div>
    <script src="/static/js/csp-shim.js?v={{assetVersion}}" defer></script>
</body>
</html>
{{end}}
